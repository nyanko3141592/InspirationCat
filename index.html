<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>InspirationCat - 閃きアニマルメーカー</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>💡 InspirationCat</h1>
        <p class="subtitle">動物の写真から「閃いた！」画像をつくろう</p>
      </header>

      <main>
        <!-- Upload Area -->
        <div id="upload-area" class="upload-area">
          <input type="file" id="file-input" accept="image/*" hidden />
          <div class="upload-content">
            <span class="upload-icon">📸</span>
            <p>タップして動物の写真を選択</p>
          </div>
        </div>

        <!-- Preview -->
        <div id="preview-section" class="preview-section hidden">
          <canvas id="result-canvas"></canvas>
          <div id="processing" class="processing hidden">
            <div class="spinner"></div>
            <p id="processing-text">背景を除去中...</p>
          </div>
        </div>

        <!-- Controls -->
        <div id="controls" class="controls hidden">
          <div class="slider-row">
            <label for="scale-slider">サイズ</label>
            <input type="range" id="scale-slider" min="0.05" max="3" step="0.05" value="0.7" />
          </div>
          <div class="slider-row">
            <label for="rotation-slider">回転</label>
            <input type="range" id="rotation-slider" min="-180" max="180" step="1" value="0" />
          </div>
          <p class="hint">ドラッグで動物の位置を調整</p>
          <div class="action-buttons">
            <button id="share-btn" class="btn btn-share">📤 シェア</button>
            <button id="download-btn" class="btn btn-primary">💾 保存</button>
            <button id="reset-btn" class="btn btn-secondary">🔄</button>
          </div>
        </div>
      </main>

      <footer>
        <p>🔒 すべての処理はお使いの端末内で完結します。画像がサーバーに送信されることはありません。</p>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
